<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지뢰찾기 - 미니게임 모음</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1e293b;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #e2e8f0;
    gap: 16px;
    padding: 24px 12px;
  }

  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #475569;
  }
  .topbar a {
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid #475569;
  }
  .topbar a:hover { background: #334155; }
  .topbar .title { color: #94a3b8; font-size: 14px; }

  h1 { margin: 48px 0 0; font-size: 24px; }

  .panel {
    background: #334155;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .counter {
    font-variant-numeric: tabular-nums;
    background: #0f172a;
    color: #f87171;
    padding: 6px 10px;
    border-radius: 6px;
    font-weight: bold;
    min-width: 56px;
    text-align: center;
  }

  .face-btn {
    font-size: 22px;
    background: #475569;
    border: none;
    border-radius: 8px;
    width: 44px;
    height: 44px;
    cursor: pointer;
  }
  .face-btn:hover { background: #64748b; }

  select, .level-select {
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #475569;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 14px;
  }

  #board {
    display: grid;
    gap: 2px;
    background: #0f172a;
    padding: 6px;
    border-radius: 6px;
  }

  .cell {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    background: #64748b;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    transition: background 0.05s;
  }
  .cell:hover { background: #94a3b8; }
  .cell.revealed {
    background: #1e293b;
    cursor: default;
  }
  .cell.revealed:hover { background: #1e293b; }
  .cell.mine { background: #ef4444; }
  .cell.mine.detonated { background: #b91c1c; }
  .cell.flag::after { content: "🚩"; font-size: 13px; }
  .cell.question::after { content: "?"; color: #facc15; }

  .n1 { color: #60a5fa; }
  .n2 { color: #4ade80; }
  .n3 { color: #f87171; }
  .n4 { color: #a78bfa; }
  .n5 { color: #fb923c; }
  .n6 { color: #22d3ee; }
  .n7 { color: #f472b6; }
  .n8 { color: #cbd5e1; }

  .status {
    text-align: center;
    margin-top: 10px;
    min-height: 22px;
    font-weight: bold;
  }
  .status.win { color: #4ade80; }
  .status.lose { color: #f87171; }

  .hint {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html">🏠 홈</a>
  <span class="title">💣 지뢰찾기</span>
</div>

<h1>💣 지뢰찾기</h1>

<div class="panel">
  <div class="toolbar">
    <div class="counter" id="mineCounter">010</div>
    <select id="levelSelect" class="level-select">
      <option value="easy">초급 (9x9, 10)</option>
      <option value="normal" selected>중급 (16x16, 40)</option>
      <option value="hard">고급 (30x16, 99)</option>
    </select>
    <button class="face-btn" id="resetBtn" title="새 게임">🙂</button>
    <div class="counter" id="timer">000</div>
  </div>
  <div id="board"></div>
  <div class="status" id="status"></div>
  <div class="hint">좌클릭: 칸 열기 &nbsp;|&nbsp; 우클릭: 깃발 표시</div>
</div>

<script>
(function () {
  const LEVELS = {
    easy:   { rows: 9,  cols: 9,  mines: 10 },
    normal: { rows: 16, cols: 16, mines: 40 },
    hard:   { rows: 16, cols: 30, mines: 99 },
  };

  const boardEl = document.getElementById("board");
  const mineCounterEl = document.getElementById("mineCounter");
  const timerEl = document.getElementById("timer");
  const statusEl = document.getElementById("status");
  const resetBtn = document.getElementById("resetBtn");
  const levelSelect = document.getElementById("levelSelect");

  let rows, cols, mineCount;
  let grid = [];
  let cellEls = [];
  let firstClick = true;
  let gameOver = false;
  let flagCount = 0;
  let revealedCount = 0;
  let timerId = null;
  let seconds = 0;

  function inBounds(r, c) {
    return r >= 0 && r < rows && c >= 0 && c < cols;
  }

  function neighbors(r, c) {
    const result = [];
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (inBounds(nr, nc)) result.push([nr, nc]);
      }
    }
    return result;
  }

  function buildGrid() {
    grid = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        row.push({
          mine: false,
          count: 0,
          revealed: false,
          flagged: false,
          question: false,
        });
      }
      grid.push(row);
    }
  }

  function placeMines(excludeR, excludeC) {
    const exclude = new Set(neighbors(excludeR, excludeC).map(([r, c]) => r + "," + c));
    exclude.add(excludeR + "," + excludeC);

    let placed = 0;
    while (placed < mineCount) {
      const r = Math.floor(Math.random() * rows);
      const c = Math.floor(Math.random() * cols);
      if (grid[r][c].mine || exclude.has(r + "," + c)) continue;
      grid[r][c].mine = true;
      placed++;
    }

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c].mine) continue;
        let cnt = 0;
        for (const [nr, nc] of neighbors(r, c)) {
          if (grid[nr][nc].mine) cnt++;
        }
        grid[r][c].count = cnt;
      }
    }
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    boardEl.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
    cellEls = [];
    for (let r = 0; r < rows; r++) {
      const rowEls = [];
      for (let c = 0; c < cols; c++) {
        const el = document.createElement("div");
        el.className = "cell";
        el.dataset.r = r;
        el.dataset.c = c;
        el.addEventListener("click", () => onLeftClick(r, c));
        el.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          onRightClick(r, c);
        });
        boardEl.appendChild(el);
        rowEls.push(el);
      }
      cellEls.push(rowEls);
    }
  }

  function updateMineCounter() {
    const remaining = mineCount - flagCount;
    mineCounterEl.textContent = String(remaining).padStart(3, "0");
  }

  function startTimer() {
    stopTimer();
    seconds = 0;
    timerEl.textContent = "000";
    timerId = setInterval(() => {
      seconds++;
      timerEl.textContent = String(Math.min(seconds, 999)).padStart(3, "0");
    }, 1000);
  }

  function stopTimer() {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
  }

  function newGame() {
    const level = LEVELS[levelSelect.value];
    rows = level.rows;
    cols = level.cols;
    mineCount = level.mines;

    firstClick = true;
    gameOver = false;
    flagCount = 0;
    revealedCount = 0;

    buildGrid();
    renderBoard();
    updateMineCounter();
    stopTimer();
    timerEl.textContent = "000";
    statusEl.textContent = "";
    statusEl.className = "status";
    resetBtn.textContent = "🙂";
  }

  function revealCell(r, c) {
    const cell = grid[r][c];
    if (cell.revealed || cell.flagged) return;
    cell.revealed = true;
    revealedCount++;

    const el = cellEls[r][c];
    el.classList.add("revealed");
    el.classList.remove("flag", "question");

    if (cell.mine) {
      el.classList.add("mine");
      return;
    }

    if (cell.count > 0) {
      el.textContent = cell.count;
      el.classList.add("n" + cell.count);
    } else {
      for (const [nr, nc] of neighbors(r, c)) {
        if (!grid[nr][nc].revealed && !grid[nr][nc].flagged) {
          revealCell(nr, nc);
        }
      }
    }
  }

  function revealAllMines(detonatedR, detonatedC) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = grid[r][c];
        const el = cellEls[r][c];
        if (cell.mine && !cell.flagged) {
          el.classList.add("revealed", "mine");
          if (r === detonatedR && c === detonatedC) {
            el.classList.add("detonated");
          }
        }
        if (!cell.mine && cell.flagged) {
          el.textContent = "❌";
        }
      }
    }
  }

  function checkWin() {
    const totalSafeCells = rows * cols - mineCount;
    if (revealedCount === totalSafeCells) {
      gameOver = true;
      stopTimer();
      statusEl.textContent = "🎉 승리했습니다!";
      statusEl.className = "status win";
      resetBtn.textContent = "😎";
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c].mine) {
            grid[r][c].flagged = true;
            cellEls[r][c].classList.add("flag");
          }
        }
      }
      updateMineCounter();
    }
  }

  function onLeftClick(r, c) {
    if (gameOver) return;
    const cell = grid[r][c];
    if (cell.flagged) return;

    if (firstClick) {
      placeMines(r, c);
      firstClick = false;
      startTimer();
    }

    if (cell.mine) {
      gameOver = true;
      stopTimer();
      revealCell(r, c);
      revealAllMines(r, c);
      statusEl.textContent = "💥 게임 오버!";
      statusEl.className = "status lose";
      resetBtn.textContent = "😵";
      return;
    }

    revealCell(r, c);
    checkWin();
  }

  function onRightClick(r, c) {
    if (gameOver) return;
    const cell = grid[r][c];
    if (cell.revealed) return;

    const el = cellEls[r][c];

    if (!cell.flagged && !cell.question) {
      cell.flagged = true;
      el.classList.add("flag");
      flagCount++;
    } else if (cell.flagged) {
      cell.flagged = false;
      cell.question = true;
      el.classList.remove("flag");
      el.classList.add("question");
      flagCount--;
    } else if (cell.question) {
      cell.question = false;
      el.classList.remove("question");
    }
    updateMineCounter();
  }

  resetBtn.addEventListener("click", newGame);
  levelSelect.addEventListener("change", newGame);

  newGame();
})();
</script>

</body>
</html>
