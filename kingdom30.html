<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#120d08">
<title>멸망까지 30일</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #120d08;
    --bg-2: #1c140c;
    --panel: #241a10;
    --border: #4a3722;
    --gold: #d9b45c;
    --gold-dim: #8d7239;
    --text: #ede3d0;
    --muted: #a8977c;
    --paper: #f2e8d2;
    --ink: #2a2118;
    --food: #7bc47f;
    --army: #d97b6c;
    --people: #d9b45c;
    --gold-res: #6fa8dc;
    --danger: #e05c4b;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(900px 500px at 50% -10%, #2a1d10 0%, transparent 70%),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Pretendard, "Malgun Gothic", sans-serif;
    line-height: 1.65;
    word-break: keep-all;
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .screen { display: none; flex: 1; flex-direction: column; padding: 18px; }
  .screen.on { display: flex; }

  button { font-family: inherit; cursor: pointer; border: none; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: clamp(15px, 4vw, 16px);
    font-weight: 700;
    background: linear-gradient(180deg, #e2c273, #b8913f);
    color: #241a10;
    border: 1px solid #f0d795;
  }
  .btn:active { filter: brightness(0.92); }
  .btn.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn + .btn { margin-top: 10px; }

  /* ---------- 타이틀 ---------- */
  #title { justify-content: center; text-align: center; gap: 4px; }
  .crown { font-size: 54px; line-height: 1; margin-bottom: 6px; }
  #title h1 {
    font-size: clamp(30px, 9vw, 40px);
    margin: 0;
    letter-spacing: 0.04em;
    color: var(--gold);
    text-shadow: 0 0 22px rgba(217,180,92,0.25);
  }
  #title .sub { color: var(--muted); font-size: 14px; margin: 2px 0 22px; }
  .rule-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: left;
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .rule-box b { color: var(--text); font-weight: 600; }
  .rule-box .res-row { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 8px; }
  .rule-box .res-row span { font-size: 13px; }
  .seed-note {
    margin-top: 14px;
    font-size: 12px;
    color: var(--gold-dim);
    min-height: 18px;
  }

  /* ---------- 상단 자원 ---------- */
  #hud { padding: 14px 18px 6px; }
  .day-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .day-row .day {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
  }
  .day-row .left { font-size: 12px; color: var(--muted); }
  .gauges { display: flex; gap: 8px; }
  .gauge { flex: 1; text-align: center; }
  .gauge .ico {
    font-size: 19px;
    line-height: 1;
    display: block;
    filter: grayscale(0.15);
    transition: transform 0.2s, filter 0.2s;
  }
  .gauge.hint .ico { transform: translateY(-3px) scale(1.18); filter: none; }
  .gauge .bar {
    height: 6px;
    border-radius: 3px;
    background: #33261a;
    margin-top: 6px;
    overflow: hidden;
  }
  .gauge .fill { height: 100%; width: 50%; transition: width 0.45s cubic-bezier(.3,1.2,.5,1); }
  .gauge.g-food .fill { background: var(--food); }
  .gauge.g-army .fill { background: var(--army); }
  .gauge.g-people .fill { background: var(--people); }
  .gauge.g-gold .fill { background: var(--gold-res); }
  .gauge.warn .bar { box-shadow: 0 0 0 1px var(--danger), 0 0 10px rgba(224,92,75,0.55); }
  .gauge .num { font-size: 10px; color: var(--muted); margin-top: 3px; display: block; }

  /* ---------- 카드 ---------- */
  #board { flex: 1; display: flex; flex-direction: column; padding: 8px 18px 18px; }
  .card-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 300px; }
  .card {
    width: 100%;
    background: linear-gradient(170deg, #f7efdc, #e6d8ba);
    color: var(--ink);
    border-radius: 14px;
    padding: 22px 20px 24px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.5);
    text-align: center;
    touch-action: pan-y;
    user-select: none;
    will-change: transform;
    position: relative;
  }
  .card .face { font-size: 46px; line-height: 1; }
  .card .who {
    font-size: 13px;
    font-weight: 700;
    color: #8a6b30;
    letter-spacing: 0.06em;
    margin: 8px 0 12px;
  }
  .card .say {
    font-size: clamp(15px, 4.3vw, 17px);
    line-height: 1.75;
    margin: 0;
    min-height: 5.2em;
  }
  .card .swipe-tip {
    margin-top: 16px;
    font-size: 11.5px;
    color: #a08b5e;
    letter-spacing: 0.04em;
  }
  .card .verdict {
    position: absolute;
    top: 16px;
    font-size: 13px;
    font-weight: 800;
    padding: 6px 12px;
    border-radius: 6px;
    opacity: 0;
    pointer-events: none;
    max-width: 45%;
    line-height: 1.35;
  }
  .card .verdict.l { left: 14px; background: rgba(224,92,75,0.92); color: #fff; transform: rotate(-7deg); }
  .card .verdict.r { right: 14px; background: rgba(96,140,90,0.92); color: #fff; transform: rotate(7deg); }

  .choices { margin-top: 14px; display: flex; gap: 10px; }
  .choice {
    flex: 1;
    padding: 13px 10px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: clamp(13px, 3.7vw, 14.5px);
    font-weight: 600;
    line-height: 1.4;
  }
  .choice:active { background: #33261a; }

  /* 결과 자막 */
  #result {
    position: absolute;
    left: 18px; right: 18px; bottom: 92px;
    background: rgba(18,13,8,0.94);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13.5px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 5;
  }
  #result.on { opacity: 1; transform: translateY(0); }
  #result .delta { color: var(--muted); font-size: 12px; margin-top: 4px; }

  /* ---------- 엔딩 ---------- */
  #ending { justify-content: flex-start; text-align: center; overflow-y: auto; }
  .end-icon { font-size: 60px; line-height: 1; margin: 18px 0 4px; }
  .end-name { font-size: clamp(24px, 7vw, 30px); margin: 0; color: var(--gold); }
  .end-kind { font-size: 12px; color: var(--muted); letter-spacing: 0.14em; margin-bottom: 14px; }
  .end-line {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    font-size: 14.5px;
    text-align: left;
    margin-bottom: 14px;
  }
  .epilogue {
    text-align: left;
    border-left: 2px solid var(--gold-dim);
    padding: 2px 0 2px 12px;
    margin: 0 2px 16px;
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
  }
  .epilogue:empty { display: none; }
  .epilogue h4 {
    margin: 0 0 6px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    font-style: normal;
  }
  .epilogue p { margin: 0 0 6px; }
  .end-stat {
    display: flex;
    justify-content: space-around;
    background: var(--bg-2);
    border-radius: 10px;
    padding: 12px 8px;
    margin-bottom: 14px;
  }
  .end-stat div { font-size: 11px; color: var(--muted); }
  .end-stat b { display: block; font-size: 20px; color: var(--gold); font-weight: 700; }
  .journal {
    text-align: left;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 16px;
    max-height: 190px;
    overflow-y: auto;
    font-size: 12.5px;
    color: var(--muted);
  }
  .journal h4 { margin: 2px 0 8px; font-size: 12px; color: var(--gold-dim); letter-spacing: 0.1em; }
  .journal p { margin: 0 0 5px; }
  .journal p b { color: var(--text); font-weight: 600; }

  /* ---------- 도감 ---------- */
  #codex { overflow-y: auto; }
  .codex-head { text-align: center; margin-bottom: 4px; }
  .codex-head h2 { color: var(--gold); margin: 6px 0 2px; font-size: 24px; }
  .codex-head p { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
  .codex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .cx {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
  }
  .cx.locked { opacity: 0.45; }
  .cx .i { font-size: 26px; line-height: 1; }
  .cx .n { font-size: 13px; font-weight: 700; margin-top: 4px; }
  .cx .d { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.45; }

  .back-home {
    text-align: center;
    padding: 12px 0 4px;
    font-size: 12px;
    color: var(--gold-dim);
  }
  .back-home a { color: inherit; }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translate(-50%, 12px);
    background: var(--gold);
    color: #241a10;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 50;
  }
  .toast.on { opacity: 1; transform: translate(-50%, 0); }
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===== 타이틀 ===== -->
  <div class="screen on" id="title">
    <div class="crown">👑</div>
    <h1>멸망까지 30일</h1>
    <p class="sub">선왕이 죽었다. 왕관은 당신의 것이 되었다.</p>

    <div class="rule-box">
      하루에 한 번, 신하가 찾아와 결정을 청한다. <b>선택은 언제나 둘뿐이다.</b>
      어느 쪽을 고르든 무언가는 잃는다.
      <div class="res-row">
        <span>🌾 식량</span><span>⚔️ 군사</span><span>👑 민심</span><span>💰 국고</span>
      </div>
      <div style="margin-top:8px">넷 중 하나라도 <b>바닥나거나 넘치면</b> 그날로 끝이다. <b>30일</b>을 버텨라.</div>
    </div>

    <button class="btn" id="btnStart">즉위한다</button>
    <button class="btn ghost" id="btnCodex">엔딩 도감</button>
    <div class="seed-note" id="seedNote"></div>
    <div class="back-home"><a href="index.html">← 미니게임 모음</a></div>
  </div>

  <!-- ===== 게임 ===== -->
  <div class="screen" id="game">
    <div id="hud">
      <div class="day-row">
        <span class="day" id="dayLabel">즉위 1일차</span>
        <span class="left" id="leftLabel">멸망까지 30일</span>
      </div>
      <div class="gauges" id="gauges"></div>
    </div>

    <div id="board">
      <div class="card-wrap">
        <div class="card" id="card">
          <div class="verdict l" id="vL"></div>
          <div class="verdict r" id="vR"></div>
          <div class="face" id="face">👑</div>
          <div class="who" id="who">재상 백윤</div>
          <p class="say" id="say"></p>
          <div class="swipe-tip">카드를 좌우로 밀거나 아래 버튼을 누르시오</div>
        </div>
      </div>
      <div class="choices">
        <button class="choice" id="cL"></button>
        <button class="choice" id="cR"></button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <!-- ===== 엔딩 ===== -->
  <div class="screen" id="ending">
    <div class="end-icon" id="endIcon">🏰</div>
    <h2 class="end-name" id="endName"></h2>
    <div class="end-kind" id="endKind"></div>
    <div class="end-line" id="endLine"></div>
    <div class="epilogue" id="epilogue"></div>
    <div class="end-stat">
      <div>버틴 날<b id="stDay">0</b></div>
      <div>내 최장 기록<b id="stBest">0</b></div>
      <div>모은 엔딩<b id="stCodex">0</b></div>
    </div>
    <div class="journal" id="journal"></div>
    <button class="btn" id="btnAgain">다시 즉위한다</button>
    <button class="btn ghost" id="btnShare">🔗 같은 운명으로 친구에게 도전장</button>
    <button class="btn ghost" id="btnCodex2">엔딩 도감</button>
    <div class="back-home"><a href="index.html">← 미니게임 모음</a></div>
  </div>

  <!-- ===== 도감 ===== -->
  <div class="screen" id="codex">
    <div class="codex-head">
      <h2>엔딩 도감</h2>
      <p id="codexCount"></p>
    </div>
    <div class="codex-grid" id="codexGrid"></div>
    <button class="btn" id="btnBack">돌아가기</button>
    <div class="back-home"><a href="index.html">← 미니게임 모음</a></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* =====================================================================
   멸망까지 30일 — 왕국 경영 생존
   자원 4개(0~100)를 30일간 양 끝(0/100) 사이에 유지하는 선택 게임.
   시드 기반이라 같은 URL이면 같은 순서의 사건이 나온다(친구 도전장).
   ===================================================================== */

/* ---------- 자원 정의 ---------- */
const RES = [
  { key: "food",   icon: "🌾", name: "식량", cls: "g-food"   },
  { key: "army",   icon: "⚔️", name: "군사", cls: "g-army"   },
  { key: "people", icon: "👑", name: "민심", cls: "g-people" },
  { key: "gold",   icon: "💰", name: "국고", cls: "g-gold"   }
];
const MAX_DAY = 30;
const STORE_KEY = "kingdom30-v1";

/* ---------- 엔딩 정의 ----------
   0/100으로 끝나는 파멸 엔딩 8종 + 30일 생존 엔딩 5종. */
const ENDINGS = [
  { id: "famine",   icon: "💀", name: "굶주린 왕국", kind: "식량 0",
    line: "곳간에서 쥐조차 굶어 죽었다. 백성은 도성을 등졌고, 왕좌에는 먼지만 앉았다." },
  { id: "gluttony", icon: "🍖", name: "나태의 궁전", kind: "식량 100",
    line: "곳간은 넘치다 못해 썩어갔다. 배부른 왕국은 칼 쥐는 법을 잊었고, 이웃은 그것을 놓치지 않았다." },
  { id: "invaded",  icon: "🏳️", name: "열린 국경", kind: "군사 0",
    line: "성문을 지킬 자가 남지 않았다. 적은 싸우지도 않고 걸어 들어왔다." },
  { id: "coup",     icon: "🪖", name: "군화 소리", kind: "군사 100",
    line: "칼을 너무 많이 쥐여주었다. 그 칼끝이 어디를 향할지는 대장군이 정했다." },
  { id: "revolt",   icon: "🔥", name: "성난 백성", kind: "민심 0",
    line: "굶주림보다 무서운 것은 원한이었다. 횃불이 궁을 둘러쌌고, 아무도 왕을 부르지 않았다." },
  { id: "beloved",  icon: "🎭", name: "더 사랑받는 자", kind: "민심 100",
    line: "백성은 왕을 사랑했다. 다만 왕관이 아니라 사람을. 그들은 곧 다른 이에게 그 사랑을 옮겼다." },
  { id: "bankrupt", icon: "🕳️", name: "텅 빈 국고", kind: "국고 0",
    line: "녹봉이 끊기자 충성도 끊겼다. 마지막까지 남은 신하는 빚쟁이뿐이었다." },
  { id: "corrupt",  icon: "🪙", name: "황금에 잠긴 왕좌", kind: "국고 100",
    line: "금은 넘쳤고 그만큼 손이 더러워졌다. 부패한 조정은 안에서부터 무너졌다." },

  { id: "puppet",    icon: "🎎", name: "속국의 왕", kind: "30일 생존 · 흑랑의 도장",
    line: "왕국은 살아남았다. 다만 이제 결정은 흑랑의 궁에서 내려온다. 당신은 왕관을 쓴 채 고개를 숙였고, 사관은 그 장면을 적지 않았다." },
  { id: "warlord",   icon: "🐺", name: "장군의 나라", kind: "30일 생존 · 무결의 전권",
    line: "30일을 넘겼다. 조례는 여전히 열리고 왕좌도 그대로다. 다만 신하들의 눈이 향하는 곳이 대장군 무결의 자리로 옮겨갔을 뿐이다." },
  { id: "theocracy", icon: "⛪", name: "신전의 나라", kind: "30일 생존 · 신전이 왕좌 위",
    line: "국사 혜명이 왕의 어깨에 손을 얹었다. 백성은 왕이 아니라 하늘의 뜻을 따랐고, 그 뜻을 읽는 자는 따로 있었다." },
  { id: "unify",     icon: "🏆", name: "정복왕", kind: "30일 생존 · 전쟁을 이겨냄",
    line: "흑랑의 깃발이 국경에서 내려갔다. 전쟁을 피하지 않았고, 군대를 끝까지 잃지 않았다. 사서는 당신을 '무(武)의 왕'이라 적었다." },
  { id: "alliance",  icon: "🕊️", name: "혼맥의 평화", kind: "30일 생존 · 흑랑과 혼인",
    line: "칼 대신 혼서가 국경을 넘었다. 어떤 이는 굴욕이라 했고 어떤 이는 지혜라 했다. 확실한 것은 30일 동안 아무도 죽지 않았다는 것이다." },
  { id: "merchant",  icon: "⚖️", name: "소금과 저울", kind: "30일 생존 · 전매와 국고",

/* ---------- 시드 난수 (같은 시드 = 같은 판) ---------- */
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ---------- 저장 ---------- */
function loadSave() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) throw 0;
    const d = JSON.parse(raw);
    return { endings: Array.isArray(d.endings) ? d.endings : [], best: d.best || 0, plays: d.plays || 0 };
  } catch (e) {
    return { endings: [], best: 0, plays: 0 };
  }
}
function writeSave(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch (e) { /* 사생활 모드 등 */ }
}

/* ---------- 상태 ---------- */
let S = null;
let seed = 0;
let busy = false;

function currentSeed() {
  const p = new URLSearchParams(location.search).get("s");
  const n = p ? parseInt(p, 10) : NaN;
  return (!isNaN(n) && n > 0) ? n : (Math.floor(Math.random() * 899999) + 100000);
}

function newGame(useSeed) {
  seed = useSeed;
  S = {
    day: 1,
    food: 50, army: 50, people: 50, gold: 50,
    flags: new Set(),
    used: new Set(),
    rand: mulberry32(seed),
    log: [],
    over: null
  };
  drawEvent();
  renderHud();
  show("game");
}

/* ---------- 사건 뽑기 ---------- */
function phaseOf(day) { return day <= 10 ? "early" : day <= 20 ? "mid" : "late"; }

function eligible(e) {
  if (S.used.has(e.id)) return false;
  if ((e.require || []).some(f => !S.flags.has(f))) return false;
  if ((e.forbid || []).some(f => S.flags.has(f))) return false;
  return true;
}

function drawEvent() {
  const ph = phaseOf(S.day);
  let pool = KINGDOM_EVENTS.filter(e => eligible(e) && (e.phase === ph || e.phase === "any"));
  if (!pool.length) pool = KINGDOM_EVENTS.filter(eligible);          // 단계 무시하고 재시도
  if (!pool.length) { S.used.clear(); pool = KINGDOM_EVENTS.slice(); } // 그래도 없으면 덱 재사용

  // 앞선 선택에 이어지는 카드(require 있는 것)를 우선 뽑아 연쇄가 실제로 터지게 한다
  const chained = pool.filter(e => (e.require || []).length > 0);
  if (chained.length && S.rand() < 0.75) pool = chained;

  const ev = pool[Math.floor(S.rand() * pool.length)];
  S.used.add(ev.id);
  S.cur = ev;
  renderCard(ev);
}

/* ---------- 화면 ---------- */
const $ = id => document.getElementById(id);
function show(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.toggle("on", s.id === name));
  try { window.scrollTo(0, 0); } catch (e) { /* jsdom 등 스크롤 없는 환경 */ }
}
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("on");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("on"), 1900);
}

function buildGauges() {
  $("gauges").innerHTML = RES.map(r => `
    <div class="gauge ${r.cls}" data-res="${r.key}">
      <span class="ico">${r.icon}</span>
      <div class="bar"><div class="fill"></div></div>
      <span class="num">0</span>
    </div>`).join("");
}

function renderHud() {
  $("dayLabel").textContent = `즉위 ${S.day}일차`;
  $("leftLabel").textContent = `멸망까지 ${Math.max(0, MAX_DAY - S.day + 1)}일`;
  RES.forEach(r => {
    const g = $("gauges").querySelector(`[data-res="${r.key}"]`);
    const v = S[r.key];
    g.querySelector(".fill").style.width = v + "%";
    g.querySelector(".num").textContent = v;
    g.classList.toggle("warn", v <= 15 || v >= 85);
  });
}

function renderCard(ev) {
  $("face").textContent = ev.icon || "📜";
  $("who").textContent = ev.speaker || "";
  $("say").textContent = ev.text;
  $("cL").textContent = ev.choices[0].label;
  $("cR").textContent = ev.choices[1].label;
  $("vL").textContent = ev.choices[0].label;
  $("vR").textContent = ev.choices[1].label;
  const c = $("card");
  c.style.transition = "none";
  c.style.transform = "translateY(14px) scale(0.97)";
  c.style.opacity = "0";
  requestAnimationFrame(() => {
    c.style.transition = "transform 0.28s cubic-bezier(.2,.9,.3,1), opacity 0.28s";
    c.style.transform = "";
    c.style.opacity = "1";
  });
}

/* 어느 자원이 흔들리는지만 미리 보여준다 — 방향과 크기는 감춘다 */
function hintRes(idx) {
  const ef = idx === null ? null : S.cur.choices[idx].effects;
  RES.forEach(r => {
    const g = $("gauges").querySelector(`[data-res="${r.key}"]`);
    g.classList.toggle("hint", !!ef && !!ef[r.key]);
  });
}

/* ---------- 선택 ---------- */
function choose(idx) {
  if (busy || !S || S.over) return;
  busy = true;
  hintRes(null);

  const ev = S.cur;
  const ch = ev.choices[idx];
  const before = { food: S.food, army: S.army, people: S.people, gold: S.gold };

  RES.forEach(r => {
    S[r.key] = Math.max(0, Math.min(100, S[r.key] + (ch.effects[r.key] || 0)));
  });
  (ch.flags || []).forEach(f => S.flags.add(f));
  S.log.push({ day: S.day, who: ev.speaker, label: ch.label });

  // 카드 날리기
  const c = $("card");
  c.style.transition = "transform 0.3s ease-in, opacity 0.3s ease-in";
  const dir = idx === 0 ? -1 : 1;
  c.style.transform = `translateX(${dir * 420}px) rotate(${dir * 18}deg)`;
  c.style.opacity = "0";

  renderHud();
  showResult(ch, before);

  const dead = deathCheck();
  setTimeout(() => {
    if (dead) { finish(dead); busy = false; return; }
    if (S.day >= MAX_DAY) { finish(survivalEnding()); busy = false; return; }
    S.day++;
    renderHud();
    drawEvent();
    busy = false;
  }, 1250);
}

function showResult(ch, before) {
  const parts = [];
  RES.forEach(r => {
    const d = S[r.key] - before[r.key];
    if (d) parts.push(`${r.icon} ${d > 0 ? "+" : ""}${d}`);
  });
  const box = $("result");
  box.innerHTML = `${ch.result || ""}<div class="delta">${parts.join("　")}</div>`;
  box.classList.add("on");
  clearTimeout(showResult._t);
  showResult._t = setTimeout(() => box.classList.remove("on"), 1450);
}

function deathCheck() {
  const map = {
    food:   ["famine", "gluttony"],
    army:   ["invaded", "coup"],
    people: ["revolt", "beloved"],
    gold:   ["bankrupt", "corrupt"]
  };
  for (const r of RES) {
    if (S[r.key] <= 0) return map[r.key][0];
    if (S[r.key] >= 100) return map[r.key][1];
  }
  return null;
}

/* 30일을 넘긴 왕의 결말.
   자원 수치만으로 가르면 어떤 판이든 비슷한 끝이 난다. 그래서 무엇을 선택했는지
   (플래그)를 먼저 보고, 아무 색깔도 남기지 않은 판만 수치로 가른다.
   위에서부터 먼저 걸리는 것이 이긴다 — 특수한 결말일수록 위에 둘 것. */
function survivalEnding() {
  const { food: f, army: a, people: p, gold: g } = S;
  const has = k => S.flags.has(k);

  if (has("vassal_pact"))                       return "puppet";     // 흑랑에 도장을 넘겼다
  if (has("mugyeol_absolute"))                  return "warlord";    // 대장군에게 전권을 줬다
  if (has("temple_above_throne"))               return "theocracy";  // 신전을 왕좌 위에 뒀다
  if (has("heukrang_war") && a >= 45)           return "unify";      // 전쟁을 치르고 군을 지켰다
  if (has("heukrang_marriage"))                 return "alliance";   // 칼 대신 혼인을 골랐다
  if (has("salt_monopoly") && g >= 45)          return "merchant";   // 전매로 국고를 세웠다
  if (has("heir_named") && p >= 40)             return "dynasty";    // 후계를 세웠고 민심이 남았다
  if (Math.min(f, a, p, g) >= 42)               return "golden";     // 아무것도 무너뜨리지 않았다
  if (Math.min(f, a, p, g) <= 20)               return "fragile";
  return "survive";
}

/* ---------- 엔딩 ---------- */
function finish(endId) {
  S.over = endId;
  const end = END_BY_ID[endId] || END_BY_ID.survive;
  const save = loadSave();
  const isNew = !save.endings.includes(endId);
  if (isNew) save.endings.push(endId);
  save.best = Math.max(save.best, S.day);
  save.plays = (save.plays || 0) + 1;
  writeSave(save);

  $("endIcon").textContent = end.icon;
  $("endName").textContent = end.name;
  $("endKind").textContent = (isNew ? "NEW · " : "") + end.kind;
  $("endLine").textContent = end.line;

  const epi = EPILOGUES.filter(e => S.flags.has(e.flag)).slice(0, 3);
  $("epilogue").innerHTML = epi.length
    ? "<h4>그 뒤의 이야기</h4>" + epi.map(e => `<p>${e.text}</p>`).join("")
    : "";

  $("stDay").textContent = S.day;
  $("stBest").textContent = save.best;
  $("stCodex").textContent = save.endings.length + " / " + ENDINGS.length;

  const rows = S.log.slice(-12).map(l =>
    `<p>${l.day}일 · ${l.who} — <b>${l.label}</b></p>`).join("");
  $("journal").innerHTML = `<h4>왕의 일지</h4>${rows}`;

  setTimeout(() => show("ending"), 700);
}

/* ---------- 도감 ---------- */
function renderCodex() {
  const save = loadSave();
  $("codexCount").textContent = `${save.endings.length} / ${ENDINGS.length} 종  ·  최장 ${save.best}일  ·  ${save.plays}회 즉위`;
  $("codexGrid").innerHTML = ENDINGS.map(e => {
    const got = save.endings.includes(e.id);
    return `<div class="cx ${got ? "" : "locked"}">
      <div class="i">${got ? e.icon : "❔"}</div>
      <div class="n">${got ? e.name : "???"}</div>
      <div class="d">${got ? e.kind : "아직 보지 못한 결말"}</div>
    </div>`;
  }).join("");
  show("codex");
}

/* ---------- 도전장 링크 ---------- */
function shareLink() {
  const url = location.origin + location.pathname + "?s=" + seed;
  const text = `멸망까지 30일 — 나는 ${S ? S.day : 0}일 버텼다. 같은 운명으로 해보겠나?\n${url}`;
  if (navigator.share) {
    navigator.share({ title: "멸망까지 30일", text: text }).catch(() => {});
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => toast("도전장을 복사했습니다"),
      () => fallbackCopy(text)
    );
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); toast("도전장을 복사했습니다"); }
  catch (e) { prompt("이 링크를 친구에게 보내세요", text); }
  document.body.removeChild(ta);
}

/* ---------- 스와이프 ---------- */
function bindSwipe() {
  const c = $("card");
  let x0 = null, dx = 0, dragging = false;

  const start = e => {
    if (busy || !S || S.over) return;
    dragging = true;
    x0 = (e.touches ? e.touches[0].clientX : e.clientX);
    dx = 0;
    c.style.transition = "none";
  };
  const move = e => {
    if (!dragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    dx = x - x0;
    c.style.transform = `translateX(${dx}px) rotate(${dx / 22}deg)`;
    const t = Math.min(1, Math.abs(dx) / 90);
    $("vL").style.opacity = dx < -10 ? t : 0;
    $("vR").style.opacity = dx > 10 ? t : 0;
    if (Math.abs(dx) > 20) hintRes(dx < 0 ? 0 : 1); else hintRes(null);
  };
  const end = () => {
    if (!dragging) return;
    dragging = false;
    $("vL").style.opacity = 0;
    $("vR").style.opacity = 0;
    if (Math.abs(dx) > 85) {
      choose(dx < 0 ? 0 : 1);
    } else {
      hintRes(null);
      c.style.transition = "transform 0.25s cubic-bezier(.2,1.4,.4,1)";
      c.style.transform = "";
    }
  };

  c.addEventListener("touchstart", start, { passive: true });
  c.addEventListener("touchmove", move, { passive: true });
  c.addEventListener("touchend", end);
  c.addEventListener("mousedown", start);
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
}

/* ---------- 시작 ---------- */
function init() {
  buildGauges();
  bindSwipe();

  const fromLink = new URLSearchParams(location.search).has("s");
  const s = currentSeed();
  $("seedNote").textContent = fromLink
    ? `도전장을 받았습니다 · 운명 번호 ${s}`
    : `운명 번호 ${s}`;

  $("btnStart").onclick = () => newGame(s);
  $("btnAgain").onclick = () => {
    // 도전장으로 들어왔으면 같은 판, 아니면 새 운명
    newGame(fromLink ? s : Math.floor(Math.random() * 899999) + 100000);
  };
  $("btnCodex").onclick = renderCodex;
  $("btnCodex2").onclick = renderCodex;
  $("btnBack").onclick = () => show(S && S.over ? "ending" : "title");
  $("btnShare").onclick = shareLink;

  $("cL").onclick = () => choose(0);
  $("cR").onclick = () => choose(1);
  $("cL").onmouseenter = () => hintRes(0);
  $("cR").onmouseenter = () => hintRes(1);
  $("cL").onmouseleave = () => hintRes(null);
  $("cR").onmouseleave = () => hintRes(null);

  document.addEventListener("keydown", e => {
    if (!$("game").classList.contains("on")) return;
    if (e.key === "ArrowLeft") choose(0);
    if (e.key === "ArrowRight") choose(1);
  });
}
init();
</script>
</body>
</html>
